<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Calculator</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrapper">
  <div class="calculator">
    <div class="screen"><span id="screen-text"></span></div>
    <div class="button-container">
      <button id="">1</button>
      <button id="">2</button>
      <button id="">3</button>
      <button id="">4</button>
      <button id="">5</button>
      <button id="">6</button>
      <button id="">7</button>
      <button id="">8</button>
      <button id="">9</button>
      <button id="">0</button>
      <button id="">.</button>
      <button id="">+</button>
      <button id="">-</button>
      <button id="">x</button>
      <button id="">/</button>
      <button id="">=</button>
      <button id="">AC</button>
    </div>
  </div>
</div>
</body>
</html>
